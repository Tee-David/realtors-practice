name: Scheduled Scraping Workflow

on:
  schedule:
    # Run at 1:00 AM UTC every day
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scheduled Scrape
        run: |
          if [ -z "${{ secrets.PROD_API_URL }}" ] || [ -z "${{ secrets.INTERNAL_API_KEY }}" ]; then
            echo "PROD_API_URL or INTERNAL_API_KEY secret not set. Skipping."
            exit 0
          fi

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.PROD_API_URL }}/api/internal/scrape/scheduled" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}")

          echo "Response: $(cat /tmp/response.json)"
          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Scrape trigger failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Scheduled scrape triggered successfully."
