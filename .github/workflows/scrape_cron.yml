name: Scrape Properties

on:
  # Daily scheduled scrape
  schedule:
    - cron: '0 1 * * *'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max pages per site (default: auto from DB)'
        required: false
        default: ''

  # Triggered from backend API (user clicks "Scrape" in the app)
  repository_dispatch:
    types: [trigger-scrape]

jobs:
  scrape:
    name: Run Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright and Chromium
        run: playwright install --with-deps chromium

      - name: Prepare scraper payload
        id: payload
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          if [ -z "$PROD_API_URL" ] || [ -z "$INTERNAL_API_KEY" ]; then
            echo "::error::PROD_API_URL or INTERNAL_API_KEY secret not set."
            exit 1
          fi

          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            # Manual trigger from app — payload already contains the job info
            echo "Triggered from app (repository_dispatch)"
            SCRAPER_PAYLOAD=$(echo "$CLIENT_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('scraperPayload',''))")
            JOB_ID=$(echo "$CLIENT_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('jobId',''))")

            if [ -z "$SCRAPER_PAYLOAD" ] || [ "$SCRAPER_PAYLOAD" = "None" ]; then
              echo "::error::No scraperPayload in repository_dispatch"
              exit 1
            fi

            echo "$SCRAPER_PAYLOAD" > /tmp/scraper_payload.json
            echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
            echo "Job ID: $JOB_ID"
          else
            # Scheduled or manual GH trigger — ask backend to create the job
            echo "Triggered by $EVENT_NAME — creating job via backend API"
            HTTP_STATUS=$(curl -s -o /tmp/create_response.json -w "%{http_code}" \
              -X POST "$PROD_API_URL/api/internal/scrape/create-job" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Key: $INTERNAL_API_KEY")

            echo "Create job response (HTTP $HTTP_STATUS):"
            cat /tmp/create_response.json
            echo ""

            if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
              echo "::error::Failed to create scrape job (HTTP $HTTP_STATUS)"
              exit 1
            fi

            # Extract payload
            JOB_ID=$(python3 -c "import json; d=json.load(open('/tmp/create_response.json')); print(d.get('jobId',''))")
            python3 -c "import json; d=json.load(open('/tmp/create_response.json')); json.dump(d['scraperPayload'], open('/tmp/scraper_payload.json','w'))"

            echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
            echo "Job ID: $JOB_ID"
          fi

          echo "Scraper payload prepared."

      - name: Run scraper
        env:
          API_BASE_URL: ${{ secrets.PROD_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PLAYWRIGHT_HEADLESS: 'true'
          LOG_LEVEL: 'INFO'
          # LLM providers (all free-tier, rotates on rate limit)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd scraper

          echo "=== Starting Scraper ==="
          echo "Job ID: ${{ steps.payload.outputs.job_id }}"
          echo "Callback URL: $API_BASE_URL"
          echo ""

          # Start the scraper FastAPI server in background
          uvicorn app:app --host 127.0.0.1 --port 8000 --log-level info &
          SCRAPER_PID=$!

          # Wait for server to be ready
          echo "Waiting for scraper server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Scraper server ready (attempt $i)"
              break
            fi
            sleep 2
          done

          # Verify server is running
          if ! curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
            echo "::error::Scraper server failed to start"
            kill $SCRAPER_PID 2>/dev/null || true
            exit 1
          fi

          # Submit the scrape job to the local scraper
          echo "Submitting scrape job..."
          HTTP_STATUS=$(curl -s -o /tmp/job_response.json -w "%{http_code}" \
            -X POST "http://127.0.0.1:8000/api/jobs" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: $INTERNAL_API_KEY" \
            -d @/tmp/scraper_payload.json)

          echo "Submit response (HTTP $HTTP_STATUS):"
          cat /tmp/job_response.json
          echo ""

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Failed to submit job to scraper (HTTP $HTTP_STATUS)"
            kill $SCRAPER_PID 2>/dev/null || true
            exit 1
          fi

          echo "Job submitted. Waiting for completion..."

          # Poll the scraper's job status until complete
          JOB_ID="${{ steps.payload.outputs.job_id }}"
          MAX_WAIT=6000  # 100 minutes max
          ELAPSED=0
          POLL_INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))

            STATUS=$(curl -sf "http://127.0.0.1:8000/api/jobs/$JOB_ID/status" 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")

            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "COMPLETED" ]; then
              echo "Scrape completed successfully! (${ELAPSED}s)"
              break
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "FAILED" ]; then
              echo "::warning::Scrape job failed (${ELAPSED}s)"
              break
            elif [ "$STATUS" = "unknown" ]; then
              # Check if the process is still alive
              if ! kill -0 $SCRAPER_PID 2>/dev/null; then
                echo "Scraper process exited (${ELAPSED}s)"
                break
              fi
            fi

            MINS=$((ELAPSED / 60))
            echo "Still running... (${MINS}m elapsed, status: $STATUS)"
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::warning::Scrape timed out after ${MAX_WAIT}s"
          fi

          # Gracefully stop the scraper
          kill $SCRAPER_PID 2>/dev/null || true
          wait $SCRAPER_PID 2>/dev/null || true

          echo "=== Scraper Finished ==="

      - name: Generate summary
        if: always()
        run: |
          echo "## Scrape Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Job ID:** ${{ steps.payload.outputs.job_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
