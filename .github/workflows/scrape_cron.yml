name: Scrape Properties

on:
  # Daily scheduled scrape
  schedule:
    - cron: '0 1 * * *'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Max pages per site (default: auto from DB)'
        required: false
        default: ''

  # Triggered from backend API (user clicks "Scrape" or "Learn Site" in the app)
  repository_dispatch:
    types: [trigger-scrape, trigger-learn]

jobs:
  # ── Job 1: Prepare batches ──
  prepare:
    name: Prepare Batches
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run the prepare step for scheduled/manual triggers
    # For repository_dispatch, skip to scrape directly
    if: github.event_name != 'repository_dispatch'
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      job_id: ${{ steps.split.outputs.job_id }}
    steps:
      - name: Create job and split into batches
        id: split
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          if [ -z "$PROD_API_URL" ] || [ -z "$INTERNAL_API_KEY" ]; then
            echo "::error::PROD_API_URL or INTERNAL_API_KEY secret not set."
            exit 1
          fi

          # Create job via backend
          HTTP_STATUS=$(curl -s -o /tmp/create_response.json -w "%{http_code}" \
            -X POST "$PROD_API_URL/api/internal/scrape/create-job" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: $INTERNAL_API_KEY")

          echo "Create job response (HTTP $HTTP_STATUS):"
          cat /tmp/create_response.json
          echo ""

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Failed to create scrape job (HTTP $HTTP_STATUS)"
            exit 1
          fi

          # Extract job ID and payload
          JOB_ID=$(python3 -c "import json; d=json.load(open('/tmp/create_response.json')); print(d.get('jobId',''))")
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"

          # Split sites into batches of 8
          python3 << 'PYTHON_SCRIPT'
          import json, math

          with open('/tmp/create_response.json') as f:
              data = json.load(f)

          payload = data.get('scraperPayload', {})
          sites = payload.get('sites', [])
          job_id = data.get('jobId', '')
          callback_url = payload.get('callbackUrl', '')

          BATCH_SIZE = 8
          num_batches = max(1, math.ceil(len(sites) / BATCH_SIZE))

          matrix_includes = []
          for i in range(num_batches):
              batch_sites = sites[i * BATCH_SIZE : (i + 1) * BATCH_SIZE]
              batch_payload = {
                  "jobId": job_id,
                  "sites": batch_sites,
                  "maxListingsPerSite": payload.get("maxListingsPerSite", 100),
                  "callbackUrl": callback_url,
                  "parameters": {
                      "batchIndex": i,
                      "totalBatches": num_batches,
                  },
              }
              # Write each batch payload to a file
              batch_file = f"/tmp/batch_{i}.json"
              with open(batch_file, 'w') as f:
                  json.dump(batch_payload, f)

              matrix_includes.append({
                  "batch_index": i,
                  "batch_file": batch_file,
                  "site_count": len(batch_sites),
                  "site_names": ", ".join(s.get("name", "?") for s in batch_sites[:3]) + ("..." if len(batch_sites) > 3 else ""),
              })

          matrix = {"include": matrix_includes}
          print(f"Created {num_batches} batches from {len(sites)} sites")

          # Write matrix as output
          import os
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
          PYTHON_SCRIPT

      - name: Upload batch payloads
        uses: actions/upload-artifact@v4
        with:
          name: batch-payloads
          path: /tmp/batch_*.json
          retention-days: 1

  # ── Job 2: Scrape batches (parallel matrix) ──
  scrape-batch:
    name: "Batch ${{ matrix.batch_index }} (${{ matrix.site_names }})"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
      max-parallel: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright and Chromium
        run: playwright install --with-deps chromium

      - name: Download batch payloads
        uses: actions/download-artifact@v4
        with:
          name: batch-payloads
          path: /tmp/

      - name: Run scraper batch
        env:
          API_BASE_URL: ${{ secrets.PROD_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PLAYWRIGHT_HEADLESS: 'true'
          LOG_LEVEL: 'INFO'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: |
          cd scraper
          BATCH_FILE="/tmp/batch_${{ matrix.batch_index }}.json"

          echo "=== Batch ${{ matrix.batch_index }} — ${{ matrix.site_count }} sites ==="
          echo "Sites: ${{ matrix.site_names }}"

          # Start scraper server
          uvicorn app:app --host 127.0.0.1 --port 8000 --log-level info &
          SCRAPER_PID=$!

          # Wait for server
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Scraper ready (attempt $i)"
              break
            fi
            sleep 2
          done

          if ! curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
            echo "::error::Scraper server failed to start"
            kill $SCRAPER_PID 2>/dev/null || true
            exit 1
          fi

          # Submit batch job
          HTTP_STATUS=$(curl -s -o /tmp/job_response.json -w "%{http_code}" \
            -X POST "http://127.0.0.1:8000/api/jobs" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: $INTERNAL_API_KEY" \
            -d @"$BATCH_FILE")

          echo "Submit response (HTTP $HTTP_STATUS):"
          cat /tmp/job_response.json
          echo ""

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Failed to submit batch (HTTP $HTTP_STATUS)"
            kill $SCRAPER_PID 2>/dev/null || true
            exit 1
          fi

          # Poll status
          JOB_ID=$(python3 -c "import json; print(json.load(open('$BATCH_FILE')).get('jobId',''))")
          MAX_WAIT=1500  # 25 minutes max per batch
          ELAPSED=0
          POLL_INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))

            STATUS=$(curl -sf "http://127.0.0.1:8000/api/jobs/$JOB_ID/status" 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")

            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "COMPLETED" ]; then
              echo "Batch completed! (${ELAPSED}s)"
              break
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "FAILED" ]; then
              echo "::warning::Batch failed (${ELAPSED}s)"
              break
            fi

            if ! kill -0 $SCRAPER_PID 2>/dev/null; then
              echo "Scraper process exited (${ELAPSED}s)"
              break
            fi

            MINS=$((ELAPSED / 60))
            echo "Running... (${MINS}m, status: $STATUS)"
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::warning::Batch timed out after ${MAX_WAIT}s"
          fi

          kill $SCRAPER_PID 2>/dev/null || true
          wait $SCRAPER_PID 2>/dev/null || true
          echo "=== Batch ${{ matrix.batch_index }} Finished ==="

  # ── Job 3: Direct dispatch scrapes (from app UI) ──
  scrape-dispatch:
    name: Run Scraper (App Dispatch)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'repository_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright and Chromium
        run: playwright install --with-deps chromium

      - name: Prepare payload
        id: payload
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          JOB_TYPE=$(echo "$CLIENT_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('type','scrape'))")
          JOB_ID=$(echo "$CLIENT_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('jobId',''))")

          if [ "$JOB_TYPE" = "learn" ]; then
            SCRAPER_PAYLOAD=$(echo "$CLIENT_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); lp=d.get('learnPayload',{}); lp=json.loads(lp) if isinstance(lp,str) else lp; print(json.dumps(lp))")
            echo "job_type=learn" >> "$GITHUB_OUTPUT"
          else
            SCRAPER_PAYLOAD=$(echo "$CLIENT_PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); sp=d.get('scraperPayload',{}); sp=json.loads(sp) if isinstance(sp,str) else sp; print(json.dumps(sp))")
            echo "job_type=scrape" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$SCRAPER_PAYLOAD" ] || [ "$SCRAPER_PAYLOAD" = "None" ]; then
            echo "::error::No payload in repository_dispatch"
            exit 1
          fi

          echo "$SCRAPER_PAYLOAD" > /tmp/scraper_payload.json
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Job ID: $JOB_ID (type: $JOB_TYPE)"

      - name: Run scraper
        env:
          API_BASE_URL: ${{ secrets.PROD_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          PLAYWRIGHT_HEADLESS: 'true'
          LOG_LEVEL: 'INFO'
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: |
          cd scraper

          echo "=== Starting Scraper ==="
          echo "Job ID: ${{ steps.payload.outputs.job_id }}"
          echo "Type: ${{ steps.payload.outputs.job_type }}"

          uvicorn app:app --host 127.0.0.1 --port 8000 --log-level info &
          SCRAPER_PID=$!

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
              echo "Scraper ready (attempt $i)"
              break
            fi
            sleep 2
          done

          if ! curl -sf http://127.0.0.1:8000/health > /dev/null 2>&1; then
            echo "::error::Scraper server failed to start"
            kill $SCRAPER_PID 2>/dev/null || true
            exit 1
          fi

          JOB_TYPE="${{ steps.payload.outputs.job_type }}"
          if [ "$JOB_TYPE" = "learn" ]; then
            ENDPOINT="http://127.0.0.1:8000/api/learn"
            MAX_WAIT=1200
          else
            ENDPOINT="http://127.0.0.1:8000/api/jobs"
            MAX_WAIT=2400
          fi

          HTTP_STATUS=$(curl -s -o /tmp/job_response.json -w "%{http_code}" \
            -X POST "$ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: $INTERNAL_API_KEY" \
            -d @/tmp/scraper_payload.json)

          echo "Submit response (HTTP $HTTP_STATUS):"
          cat /tmp/job_response.json
          echo ""

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Failed to submit job (HTTP $HTTP_STATUS)"
            kill $SCRAPER_PID 2>/dev/null || true
            exit 1
          fi

          JOB_ID="${{ steps.payload.outputs.job_id }}"
          ELAPSED=0
          POLL_INTERVAL=15

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $POLL_INTERVAL
            ELAPSED=$((ELAPSED + POLL_INTERVAL))

            STATUS=$(curl -sf "http://127.0.0.1:8000/api/jobs/$JOB_ID/status" 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")

            if [ "$STATUS" = "completed" ] || [ "$STATUS" = "COMPLETED" ]; then
              echo "Job completed! (${ELAPSED}s)"
              break
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "FAILED" ]; then
              echo "::warning::Job failed (${ELAPSED}s)"
              break
            fi

            if ! kill -0 $SCRAPER_PID 2>/dev/null; then
              echo "Scraper process exited (${ELAPSED}s)"
              break
            fi

            MINS=$((ELAPSED / 60))
            echo "Running... (${MINS}m, status: $STATUS)"
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::warning::Timed out after ${MAX_WAIT}s"
          fi

          kill $SCRAPER_PID 2>/dev/null || true
          wait $SCRAPER_PID 2>/dev/null || true
          echo "=== Scraper Finished ==="

      - name: Report final status
        if: always()
        env:
          PROD_API_URL: ${{ secrets.PROD_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          JOB_ID="${{ steps.payload.outputs.job_id }}"
          JOB_STATUS="${{ job.status }}"

          if [ -n "$JOB_ID" ] && [ -n "$PROD_API_URL" ] && [ -n "$INTERNAL_API_KEY" ]; then
            if [ "$JOB_STATUS" = "cancelled" ] || [ "$JOB_STATUS" = "failure" ]; then
              curl -sf -X POST "$PROD_API_URL/api/internal/scrape-error" \
                -H "Content-Type: application/json" \
                -H "X-Internal-Key: $INTERNAL_API_KEY" \
                -d "{\"jobId\":\"$JOB_ID\",\"error\":\"GitHub Actions workflow $JOB_STATUS\"}" \
                --max-time 15 || true
            fi
          fi

      - name: Generate summary
        if: always()
        run: |
          echo "## Scrape Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** repository_dispatch (${{ steps.payload.outputs.job_type }})" >> $GITHUB_STEP_SUMMARY
          echo "**Job ID:** ${{ steps.payload.outputs.job_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
