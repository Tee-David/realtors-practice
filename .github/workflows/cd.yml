name: CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        # Uses Render Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set. Skipping."
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel
        # Uses Vercel Deploy Hook
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
          else
            echo "VERCEL_DEPLOY_HOOK_URL secret not set. Skipping."
          fi
