services:
  - type: web
    name: rp-api
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EXCHANGERATE_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_MASTER_KEY
        sync: false
      - key: SCRAPER_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false

  - type: pserver
    name: meilisearch
    env: docker
    image:
      url: getmeili/meilisearch:v1.11.2
    disk:
      name: meili-data
      mountPath: /meili_data
      sizeGB: 10
    envVars:
      - key: MEILI_ENV
        value: production
      - key: MEILI_MASTER_KEY
        generateValue: true
      - key: MEILI_NO_ANALYTICS
        value: "true"
