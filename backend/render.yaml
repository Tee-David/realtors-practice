services:
  - type: web
    name: rp-api
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EXCHANGERATE_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_MASTER_KEY
        sync: false
      - key: SCRAPER_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
